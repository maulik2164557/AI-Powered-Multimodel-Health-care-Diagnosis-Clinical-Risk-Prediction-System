{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Health | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="page-shell">

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'accounts:dashboard_redirect' %}">
                <i class="fas fa-shield-halved me-2"></i>SMART HEALTH
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'accounts:admin_dashboard' %}">Dashboard</a></li>
                    <li class="nav-item ms-lg-2">
                        <span class="btn btn-outline-primary rounded-pill px-4">{{ request.user.username }}</span>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-ai rounded-pill px-4" href="{% url 'accounts:logout' %}"><i class="fas fa-sign-out-alt me-1"></i>Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            <div class="mb-3">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} mb-2">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <div class="card-glass p-4 animate_animated animate_fadeInUp">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <hr class="border-secondary">
            <div class="text-center small opacity-50">
                &copy; 2026 Smart Healthcare System | All rights reserved.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
